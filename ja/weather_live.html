			<div id="main">
				<div class="inner">
					<h1>天気予報アプリ</h1>
					都市名を入力すると、その都市の現在の天気に関する情報が表示される。 
					<div class="weather">
						<div class="search">
							<input type="text" autofocus="autofocus" id="search-bar" class="search-bar">
							<input type="hidden" class="lang" value="ja">
							<div id="map" class="map"></div>
							<button>場所を設定する</button>
						</div>
						<h7 class = "city" ></h7>
						<div class="temp"></div>
						<img src="" alt="" class="icon"/>
						<div class="description"></div>
						<div class="humidity"></div>
						<div class="wind"></div>
					</div>
				</div>
			</div>
