			<div id="main">
				<div class="inner">
					<h1>Weather APP</h1>
					Type the city name or drag the map to get the current weather.
					<div class="weather">
						<div class="search">
							<input type="text" autofocus="autofocus" id="search-bar" class="search-bar">
							<input type="hidden" class="lang" value="en">
							<div id="map" class="map"></div>
							<button>Set Location</button>
						</div>
						<h7 class = "city" ></h7>
						<div class="temp"></div>
						<img src="" alt="" class="icon"/>
						<div class="description"></div>
						<div class="humidity"></div>
						<div class="wind"></div>
					</div>
				</div>
			</div>
